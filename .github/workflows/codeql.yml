name: "CodeQL"

permissions:
  contents: read

on:
  push:
    branches:
    - "main"
  pull_request:
    branches:
    - "main"
  schedule:
  - cron: '16 11 * * 5'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

    - name: Initialize CodeQL
      uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1  # 4.37.2
      with:
        languages: go

    - name: Build
      run: make build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1  # 4.37.2
      with:
        category: "/language:go"
